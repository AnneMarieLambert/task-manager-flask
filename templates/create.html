{% extends 'base.html' %}

{% block title %}Nova Tarefa{% endblock %}

{% block content %}
<div class="form-card">
    <h2 class="form-title">Criar Nova Tarefa</h2>
    
    <form action="{{ url_for('create') }}" method="POST" id="create-task-form">
        <!-- Campo: Título -->
        <div class="form-group">
            <label for="title" class="form-label">Título da Tarefa *</label>
            <input 
                type="text" 
                name="title" 
                id="title" 
                class="form-control" 
                placeholder="Ex: Modelar Diagrama de Classes" 
                required 
                autofocus
            >
        </div>
        
        <!-- Campo: Descrição -->
        <div class="form-group">
            <label for="description" class="form-label">Descrição / Critérios de Aceite</label>
            <textarea 
                name="description" 
                id="description" 
                class="form-control" 
                placeholder="Detalhes sobre as tarefas, passos para conclusão ou notas importantes."
            ></textarea>
        </div>
        
        <!-- Grid de Configurações da Metodologia -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <!-- Campo: Prioridade -->
            <div class="form-group">
                <label for="priority" class="form-label">Prioridade</label>
                <select name="priority" id="priority" class="form-control">
                    <option value="Baixa">🟢 Baixa</option>
                    <option value="Média" selected>🟡 Média</option>
                    <option value="Alta">🔴 Alta</option>
                </select>
            </div>
            
            <!-- Campo: Status inicial no Kanban -->
            <div class="form-group">
                <label for="status" class="form-label">Status Inicial</label>
                <select name="status" id="status" class="form-control">
                    <option value="A Fazer" selected>📋 A Fazer</option>
                    <option value="Em Progresso">🚀 Em Progresso</option>
                    <option value="Concluído">🎯 Concluído</option>
                </select>
            </div>
        </div>
        
        <!-- Ações do Formulário -->
        <div class="form-actions">
            <a href="{{ url_for('index') }}" class="btn btn-secondary" id="btn-cancel-create">
                Cancelar
            </a>
            <button type="submit" class="btn btn-primary" id="btn-submit-create">
                Salvar Tarefa
            </button>
        </div>
    </form>
</div>
{% endblock %}
